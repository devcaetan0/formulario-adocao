<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Adoção de Cachorros</title>
</head>

<body>

    <div class="container">

        <form action="" id="formulario">

            <label for="nome">Nome completo:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Seu nome">
            <div id="erro_nome" class="erro"></div>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" placeholder="exemplo@gmail.com">
            <div id="erro_email" class="erro"></div>

            <label for="telefone">Número de telefone:</label><br>
            <input type="text" id="telefone" name="telefone" placeholder="+55 (00) 90000-0000">
            <div id="erro_telefone" class="erro"></div>

            <label for="cpf">CPF:</label><br>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
            <div id="erro_cpf" class="erro"></div>

            <label for="nascimento">Data de nascimento:</label><br>
            <input type="date" id="nascimento" name="nascimento" max="2026-12-31">
            <div id="erro_nascimento" class="erro"></div>

            <label for="cidade">Cidade:</label><br>
            <input type="text" id="cidade" name="cidade" placeholder="Sua Cidade">
            <div id="erro_cidade" class="erro"></div>

            <label for="moradia">Tipo de moradia:</label><br>
            <select name="moradia" id="moradia">
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>
            <br>

            <label>Possui quintal:</label><br>
            <input type="radio" id="quintal_sim" name="quintal" value="sim">
            <label for="quintal_sim">Sim</label>
            <input type="radio" id="quintal_nao" name="quintal" value="nao">
            <label for="quintal_nao">Não</label>
            <div id="erro_quintal" class="erro"></div>

            <label>Já cuidou de algum animal:</label><br>
            <input type="radio" id="cuidou_sim" name="cuidou" value="sim">
            <label for="cuidou_sim">Sim</label>
            <input type="radio" id="cuidou_nao" name="cuidou" value="nao">
            <label for="cuidou_nao">Não</label>
            <div id="erro_cuidou" class="erro"></div>

            <label for="horas">Quantas horas o animal ficará sozinho por dia:</label><br>
            <input type="number" id="horas" name="horas" placeholder="0" min="0" max="24">
            <br>
            <div id="erro_horas" class="erro"></div>

            <label for="">Motivo da adoção:</label><br>
            <textarea name="motivo" id="motivo" placeholder="Explique o motivo aqui."></textarea>
            <div id="erro_motivo" class="erro"></div>

            <input type="checkbox" id="termo" name="termo">
            <label for="termo">Aceito os termos de responsabilidade.</label>
            <div id="erro_termo" class="erro"></div>

            <button type="submit">Enviar Formulário</button>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
